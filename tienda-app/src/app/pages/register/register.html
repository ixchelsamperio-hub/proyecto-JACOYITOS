<div class="register-page">
  <div class="register-card">
    <div class="register-header">
      <span class="logo">🌿</span>
      <h1>Jacoyitos</h1>
      <p>Crea tu cuenta y empieza a comprar</p>
    </div>

    @if (error()) {
      <div class="error-msg">⚠️ {{ error() }}</div>
    }

    <div class="form-grid">
      <div class="field">
        <label>Nombre(s) *</label>
        <input [(ngModel)]="form.name" placeholder="Tu nombre" />
      </div>
      <div class="field">
        <label>Apellido(s) *</label>
        <input [(ngModel)]="form.lastName" placeholder="Tu apellido" />
      </div>
      <div class="field full">
        <label>Correo electrónico *</label>
        <input type="email" [(ngModel)]="form.email" placeholder="tu@email.com" />
      </div>
      <div class="field">
        <label>Contraseña *</label>
        <input type="password" [(ngModel)]="form.password" placeholder="Mínimo 6 caracteres" />
      </div>
      <div class="field">
        <label>Confirmar contraseña *</label>
        <input type="password" [(ngModel)]="form.confirmPassword" placeholder="Repite tu contraseña" />
      </div>
      <div class="field full">
        <label>Teléfono</label>
        <input type="tel" [(ngModel)]="form.phone" placeholder="55-0000-0000" />
      </div>
      <div class="field full">
        <label>Dirección de entrega *</label>
        <textarea [(ngModel)]="form.address" placeholder="Calle, número, colonia, ciudad..." rows="2"></textarea>
        <span class="field-hint">📍 Aquí te mandaremos tus compras</span>
      </div>
    </div>

    <button class="submit-btn" (click)="submit()" [disabled]="loading()">
      {{ loading() ? 'Creando cuenta...' : '🌿 Crear mi cuenta' }}
    </button>

    <div class="login-link">
      ¿Ya tienes cuenta? <a routerLink="/login">Inicia sesión aquí</a>
    </div>
  </div>
</div>

<div class="login-page">
  <div class="login-card">
    <div class="login-header">
      <span class="logo">🌿</span>
      <h1>Jacoyitos</h1>
      <p>Inicia sesión en tu cuenta</p>
    </div>

    
    @if (error()) {
      <div class="error-msg">⚠️ {{ error() }}</div>
    }
    <div class="field">
      <label>Correo electrónico</label>
      <input type="email" [(ngModel)]="email" placeholder="tu@email.com" (keyup.enter)="submit()" />
    </div>
    <div class="field">
      <label>Contraseña</label>
      <input type="password" [(ngModel)]="password" placeholder="••••••••" (keyup.enter)="submit()" />
    </div>
    <button class="submit-btn" (click)="submit()" [disabled]="loading()">
      {{ loading() ? 'Iniciando sesión...' : 'Iniciar Sesión' }}
    </button>

    <div class="register-link">
      ¿No tienes cuenta? <a routerLink="/register">Regístrate aquí</a>
    </div>
    <div class="back-link">
      <a routerLink="/">← Volver a la tienda</a>
    </div>
  </div>
</div>

<div class="login-page">
  <div class="login-card">
    <div class="login-header">
      <span class="logo">🌿</span>
      <h1>Jacoyitos</h1>
      <p>Inicia sesión en tu cuenta</p>
    </div>

    <div class="demo-accounts">
      <p class="demo-title">Cuentas de prueba:</p>
      <div class="demo-list">
        <div class="demo-item admin">
          <strong>Admin</strong>
          <span>admin&#64;tienda.com / admin123</span>
        </div>
        <div class="demo-item client">
          <strong> Cliente</strong>
          <span>carlos&#64;mail.com / user123</span>
        </div>
      </div>
    </div>

    <div class="form">
      @if (error()) {
        <div class="error-msg"> {{ error() }}</div>
      }
      <div class="field">
        <label>Correo electrónico</label>
        <input type="email" [(ngModel)]="email" placeholder="tu@email.com" (keyup.enter)="submit()" />
      </div>
      <div class="field">
        <label>Contraseña</label>
        <input type="password" [(ngModel)]="password" placeholder="••••••••" (keyup.enter)="submit()" />
      </div>
      <button class="submit-btn" (click)="submit()" [disabled]="loading()">
        {{ loading() ? 'Iniciando sesión...' : 'Iniciar Sesión' }}
      </button>
    </div>

    <div class="back-link">
      <a routerLink="/">← Volver a la tienda</a>
    </div>
  </div>
</div>

<nav class="navbar">
  <div class="nav-brand">
    <a routerLink="/" class="brand-link">
      <span class="brand-icon">🌿</span>
      <span class="brand-name">Jacoyitos</span>
    </a>
  </div>

  <div class="nav-links">
    <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}">Inicio</a>
    @if (auth.isAdmin()) {
      <a routerLink="/admin" routerLinkActive="active">Panel Admin</a>
    }
  </div>

  <div class="nav-actions">
    @if (auth.isLoggedIn()) {
      @if (!auth.isAdmin()) {
        <a routerLink="/cart" class="cart-btn">
          🛒 <span class="cart-badge">{{ cart.count() }}</span>
        </a>
      }
      <span class="user-info">
        <span class="user-role" [class.admin]="auth.isAdmin()">
          {{ auth.isAdmin() ? '⚙️ Admin' : '👤' }}
        </span>
        {{ auth.currentUser()?.name }}
      </span>
      <button (click)="logout()" class="logout-btn">Salir</button>
    } @else {
      <a routerLink="/login" class="login-btn">Iniciar Sesión</a>
    }
  </div>
</nav>
